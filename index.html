// ========== 启动：自动恢复已保存的文件夹 ==========
let pendingRestore = []; // 需要用户手势重新授权的文件夹

async function init() {
  const saved = await getSavedFolders();
  pendingRestore = [];

  for (const { id, name, handle } of saved) {
    if (!handle) continue;

    try {
      const perm = await handle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        const folder = { id, name: handle.name, handle, children: [], expanded: true };
        state.folders.push(folder);
        await loadFolderChildren(folder);
      } else if (perm === 'prompt') {
        // 需要用户手势才能重新授权，先记下来
        pendingRestore.push({ id, name, handle });
      } else {
        // 'denied'，从存储中移除
        await removeSavedFolder(id);
      }
    } catch (err) {
      await removeSavedFolder(id);
    }
  }

  if (state.folders.length === 0 && pendingRestore.length === 0) {
    const suggest = confirm('欢迎使用拾元文件夹！\n\n是否立即添加一个文件夹开始管理？');
    if (suggest) await addFolder();
  }

  refreshAllFiles();
  renderAll();

  // 有待恢复的文件夹，显示恢复按钮
  if (pendingRestore.length > 0) {
    showRestoreBanner();
  }
}

function showRestoreBanner() {
  // 在侧边栏顶部插入恢复提示
  const banner = document.createElement('div');
  banner.id = 'restore-banner';
  banner.style.cssText = `
    margin: 8px 12px;
    padding: 10px 12px;
    background: rgba(0,122,255,0.08);
    border: 1px solid rgba(0,122,255,0.2);
    border-radius: 8px;
    font-size: 12px;
    text-align: center;
  `;
  banner.innerHTML = `
    <div style="color:var(--text-secondary);margin-bottom:6px">
      有 ${pendingRestore.length} 个文件夹待恢复
    </div>
    <button id="restore-btn" style="
      padding: 4px 14px;
      font-size: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font);
    ">🔄 一键恢复</button>
  `;
  dom.folderList.prepend(banner);

  banner.querySelector('#restore-btn').addEventListener('click', async () => {
    const btn = banner.querySelector('#restore-btn');
    btn.textContent = '恢复中...';
    btn.disabled = true;

    for (const item of pendingRestore) {
      try {
        const perm = await item.handle.requestPermission({ mode: 'readwrite' });
        if (perm === 'granted') {
          const folder = { id: item.id, name: item.handle.name, handle: item.handle, children: [], expanded: true };
          state.folders.push(folder);
          await loadFolderChildren(folder);
        }
      } catch (err) {
        await removeSavedFolder(item.id);
      }
    }

    pendingRestore = [];
    banner.remove();
    refreshAllFiles();
    renderAll();
  });
}

init().catch(console.error);
</script>

</body>

<!-- ===== 模块管理与聊天功能 ===== -->
<script>
// ========== 模块切换 ==========
let activeModule = 'file';
function switchModule(name) {
  activeModule = name;
  document.querySelectorAll('.module-btn').forEach(b => b.classList.toggle('active', b.dataset.module === name));
  document.querySelectorAll('.module-content').forEach(c => c.classList.toggle('active', c.id === name + '-module'));
  if (name === 'cli') loadCliList();
  if (name === 'mcp') loadMcpList();
  if (name === 'model') loadModelList();
  saveState();
}

document.querySelectorAll('.module-btn').forEach(b => {
  b.addEventListener('click', () => switchModule(b.dataset.module));
});

// ========== 导航折叠 ==========
let navCollapsed = false;
document.getElementById('nav-toggle').addEventListener('click', () => {
  navCollapsed = !navCollapsed;
  document.getElementById('module-nav').classList.toggle('collapsed', navCollapsed);
  document.getElementById('nav-toggle').textContent = navCollapsed ? '▶' : '◀';
});

// ========== 聊天折叠 ==========
let chatCollapsed = false;
document.getElementById('chat-toggle').addEventListener('click', () => {
  chatCollapsed = !chatCollapsed;
  document.getElementById('chat-column').classList.toggle('collapsed', chatCollapsed);
  document.getElementById('chat-toggle').textContent = chatCollapsed ? '◀' : '▶';
});

// ========== 聊天栏拖拽调整宽度 ==========
(function() {
  let isResizing = false, startX, startWidth;
  const resizer = document.getElementById('chat-resizer');
  const chatCol = document.getElementById('chat-column');
  resizer.addEventListener('mousedown', (e) => {
    isResizing = true; startX = e.clientX; startWidth = chatCol.offsetWidth;
    document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const newWidth = Math.max(260, Math.min(600, startWidth - (e.clientX - startX)));
    chatCol.style.width = newWidth + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (isResizing) { isResizing = false; document.body.style.cursor = ''; document.body.style.userSelect = ''; }
  });
})();

// ========== 模型预设 ==========
const MODEL_PRESETS = [
  { name: 'DeepSeek V3', url: 'https://api.deepseek.com/v1', model: 'deepseek-chat', desc: '国产高性价比' },
  { name: 'DeepSeek R1', url: 'https://api.deepseek.com/v1', model: 'deepseek-reasoner', desc: '深度推理' },
  { name: 'OpenAI GPT-4o', url: 'https://api.openai.com/v1', model: 'gpt-4o', desc: 'OpenAI 旗舰' },
  { name: 'OpenAI GPT-4o-mini', url: 'https://api.openai.com/v1', model: 'gpt-4o-mini', desc: '轻量快速' },
  { name: 'GLM-4', url: 'https://open.bigmodel.cn/api/paas/v4', model: 'glm-4', desc: '智谱旗舰' },
  { name: '通义千问', url: 'https://dashscope.aliyuncs.com/compatible-mode/v1', model: 'qwen-plus', desc: '阿里旗舰' },
  { name: 'Moonshot Kimi', url: 'https://api.moonshot.cn/v1', model: 'moonshot-v1-8k', desc: '月之暗面' },
  { name: '自定义', url: '', model: '', desc: '输入任意 OpenAI 兼容地址' },
];

let modelConfig = { models: [] };
let chatMessages = [];

async function loadModelConfig() {
  try {
    const resp = await fetch('/api/models'); modelConfig = await resp.json();
  } catch(e) { modelConfig = { models: [] }; }
  refreshModelSelect();
}
function saveModelConfig() { fetch('/api/models', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(modelConfig) }); }

function refreshModelSelect() {
  const sel = document.getElementById('chat-model-select');
  sel.innerHTML = '<option value="">未选择模型</option>';
  modelConfig.models.forEach((m, i) => { const o = document.createElement('option'); o.value = i; o.textContent = m.name; sel.appendChild(o); });
}

function loadModelList() {
  const container = document.getElementById('model-list');
  if (modelConfig.models.length === 0) {
    container.innerHTML = '<div class="empty-state" style="padding:32px">还没有添加模型，点击下方按钮添加</div>';
    return;
  }
  container.innerHTML = modelConfig.models.map((m, i) => `
    <div class="mgmt-card">
      <div class="mgmt-card-header">
        <span class="mgmt-icon">🤖</span>
        <h4>${m.name}</h4>
        <span class="mgmt-badge">${m.model}</span>
        <button class="remove-model-btn" onclick="removeModel(${i})">移除</button>
      </div>
      <p><b>地址：</b><code>${m.url}</code> &nbsp; <b>模型：</b><code>${m.model || '(默认)'}</code></p>
      <p style="margin-top:4px">${m.desc || ''}</p>
    </div>
  `).join('');
}

function removeModel(idx) {
  if (!confirm('确定移除模型「' + modelConfig.models[idx].name + '」吗？')) return;
  modelConfig.models.splice(idx, 1);
  saveModelConfig();
  refreshModelSelect();
  loadModelList();
}

function showAddModelForm() {
  const container = document.getElementById('model-list');
  container.innerHTML = `
    <div class="mgmt-card model-form">
      <h4 style="margin-bottom:14px">添加模型</h4>
      <div class="form-group">
        <label>选择预设</label>
        <select id="model-preset" onchange="fillModelPreset()">
          <option value="">-- 选择预设 --</option>
          ${MODEL_PRESETS.map((p, i) => `<option value="${i}">${p.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>模型名称</label>
        <input id="model-name-inp" placeholder="例如：DeepSeek V3">
      </div>
      <div class="form-group">
        <label>API 地址（OpenAI 兼容）</label>
        <input id="model-url-inp" placeholder="https://api.deepseek.com/v1">
      </div>
      <div class="form-group">
        <label>模型 ID</label>
        <input id="model-id-inp" placeholder="deepseek-chat（留空用默认）">
      </div>
      <div class="form-group">
        <label>API Key</label>
        <div class="api-key-wrap">
          <input id="model-key-inp" type="password" placeholder="sk-...">
          <button class="toggle-key" onclick="toggleKey(this, 'model-key-inp')">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label>描述（可选）</label>
        <input id="model-desc-inp" placeholder="简单描述">
      </div>
      <button class="add-model-btn" onclick="saveModel()">保存</button>
    </div>`;
}

function fillModelPreset() {
  const idx = parseInt(document.getElementById('model-preset').value);
  if (isNaN(idx)) return;
  const p = MODEL_PRESETS[idx];
  document.getElementById('model-name-inp').value = p.name;
  document.getElementById('model-url-inp').value = p.url;
  document.getElementById('model-id-inp').value = p.model;
  document.getElementById('model-desc-inp').value = p.desc;
}

function toggleKey(btn, inputId) {
  const inp = document.getElementById(inputId);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}

function saveModel() {
  const name = document.getElementById('model-name-inp').value.trim();
  const url = document.getElementById('model-url-inp').value.trim();
  const model = document.getElementById('model-id-inp').value.trim();
  const key = document.getElementById('model-key-inp').value.trim();
  const desc = document.getElementById('model-desc-inp').value.trim();
  if (!name || !url || !key) { alert('模型名称、API 地址和 Key 不能为空'); return; }
  modelConfig.models.push({ name, url, model, key, desc });
  saveModelConfig();
  refreshModelSelect();
  loadModelList();
}

// ========== CLI 列表 ==========
async function loadCliList() {
  try {
    const resp = await fetch('/api/cli');
    const data = await resp.json();
    const container = document.getElementById('cli-list');
    const items = data.items || {};
    const keys = Object.keys(items);
    if (keys.length === 0) { container.innerHTML = '<div class="empty-state" style="padding:32px">还没有配置 CLI 工具</div>'; return; }
    container.innerHTML = keys.map(key => {
      const c = items[key];
      return `
        <div class="mgmt-card">
          <div class="mgmt-card-header">
            <span class="mgmt-icon">${c.icon || '🔧'}</span>
            <h4>${c.name}</h4>
            <span class="mgmt-badge">${key}</span>
          </div>
          <p>${c.description || ''}</p>
          ${c.tutorial ? `<details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent);font-size:12px">📖 使用教程</summary><div style="margin-top:8px;padding:12px;background:var(--bg);border-radius:6px;font-size:12px;color:var(--text-secondary);line-height:1.6">${simpleMD(c.tutorial)}</div></details>` : ''}
        </div>`;
    }).join('');
  } catch(e) { document.getElementById('cli-list').innerHTML = '<div class="empty-state">加载失败</div>'; }
}

// ========== MCP 列表 ==========
async function loadMcpList() {
  try {
    const resp = await fetch('/api/mcp');
    const data = await resp.json();
    const container = document.getElementById('mcp-list');
    const items = data.items || {};
    const keys = Object.keys(items);
    if (keys.length === 0) { container.innerHTML = '<div class="empty-state" style="padding:32px">还没有配置 MCP 服务器</div>'; return; }
    container.innerHTML = keys.map(key => {
      const m = items[key];
      return `
        <div class="mgmt-card">
          <div class="mgmt-card-header">
            <span class="mgmt-icon">${m.icon || '🔌'}</span>
            <h4>${m.name}</h4>
            <span class="mgmt-badge">${key}</span>
          </div>
          <p>${m.description || ''}</p>
          ${m.command ? `<p style="margin-top:4px"><b>启动命令：</b><code>${m.command}</code></p>` : ''}
          ${m.tutorial ? `<details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent);font-size:12px">📖 使用说明</summary><div style="margin-top:8px;padding:12px;background:var(--bg);border-radius:6px;font-size:12px;color:var(--text-secondary);line-height:1.6">${simpleMD(m.tutorial)}</div></details>` : ''}
        </div>`;
    }).join('');
  } catch(e) { document.getElementById('mcp-list').innerHTML = '<div class="empty-state">加载失败</div>'; }
}

// ========== 聊天功能 ==========
async function sendChat() {
  const inputEl = document.getElementById('chat-input');
  const text = inputEl.value.trim();
  if (!text) return;

  const modelIdx = parseInt(document.getElementById('chat-model-select').value);
  if (isNaN(modelIdx) || !modelConfig.models[modelIdx]) { alert('请先选择模型'); return; }

  const model = modelConfig.models[modelIdx];
  inputEl.value = ''; inputEl.style.height = '38px';
  inputEl.disabled = true; document.getElementById('chat-send').disabled = true;

  // 显示用户消息
  addChatMessage('user', text);
  // 创建助手消息占位
  const msgEl = addChatMessage('assistant', '');
  msgEl.textContent = '思考中...';

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        api_key: model.key,
        base_url: model.url,
        model: model.model,
        messages: [{ role: 'user', content: text }],
        stream: false
      })
    });
    const data = await resp.json();
    if (data.error) {
      msgEl.textContent = '❌ ' + data.error;
      msgEl.classList.add('error');
    } else if (data.choices && data.choices[0]) {
      msgEl.textContent = data.choices[0].message.content;
    } else {
      msgEl.textContent = '⚠️ 返回格式异常';
    }
  } catch(e) {
    msgEl.textContent = '❌ 网络错误：' + e.message;
    msgEl.classList.add('error');
  }

  inputEl.disabled = false; document.getElementById('chat-send').disabled = false;
  inputEl.focus();
}

function addChatMessage(role, content) {
  const container = document.getElementById('chat-messages');
  // 移除空状态
  const empty = container.querySelector('.chat-empty');
  if (empty) empty.remove();
  const el = document.createElement('div');
  el.className = 'chat-msg ' + role;
  el.textContent = content;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
  return el;
}

// ========== 启动 ==========
loadModelConfig();
refreshModelSelect();
</script>
