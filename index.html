<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PartnerFM</title>
<style>
/* ========== 基础 ========== */
:root {
  --bg: #f2f2f7;
  --bg-card: #ffffff;
  --bg-sidebar: rgba(248,248,252,0.85);
  --bg-chat: #f9f9fc;
  --text: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #aeaeb2;
  --accent: #007AFF;
  --accent-hover: #0060d0;
  --border: #e5e5ea;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --radius: 8px;
  --radius-lg: 12px;
  --nav-width: 64px;
  --chat-width: 380px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
  --font-mono: "SF Mono", "Menlo", "Monaco", "Cascadia Code", monospace;
}

/* ========== 全局 ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ========== 布局 ========== */
#app { height: 100vh; display: flex; flex-direction: column; }
#main-layout { display: flex; flex: 1; overflow: hidden; }

/* ========== 模块导航 ========== */
#module-nav {
  width: var(--nav-width);
  min-width: 52px;
  background: rgba(248,248,252,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 12px;
  gap: 4px;
  position: relative;
  z-index: 10;
}
#module-nav.collapsed { width: 0; min-width: 0; overflow: hidden; border: none; }

.module-btn {
  width: 48px; height: 48px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  border-radius: 10px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: var(--font);
  font-size: 10px;
  color: var(--text-secondary);
  transition: all 0.12s;
}
.module-btn:hover { background: rgba(0,0,0,0.05); color: var(--text); }
.module-btn.active { background: rgba(0,122,255,0.1); color: var(--accent); font-weight: 600; }
.module-btn .mb-icon { font-size: 20px; line-height: 1; }
.module-btn .mb-label { font-size: 10px; line-height: 1.2; }

#nav-toggle {
  margin-top: auto; margin-bottom: 8px;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: #fff;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-tertiary);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
#nav-toggle:hover { background: #f0f0f5; color: var(--text); }

/* ========== 中间列 ========== */
#center-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
#center-panel.collapsed { flex: 0; min-width: 0; overflow: hidden; }

/* 模块内容容器 */
.module-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.module-content.active { display: flex; }

/* ========== 文件模块（保持原有结构）========== */
#file-module { display: none; flex-direction: row; flex: 1; overflow: hidden; }
#file-module.active { display: flex; }

#sidebar {
  width: 260px; min-width: 220px;
  background: var(--bg-sidebar);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  resize: horizontal;
  overflow: hidden;
}
#sidebar.collapsed { width: 36px; min-width: 36px; overflow: hidden; }

.sidebar-top { padding: 20px 16px 12px; }
.sidebar-top h1 {
  font-size: 18px; font-weight: 700; letter-spacing: -0.2px;
  color: var(--text); margin-bottom: 14px;
  display: flex; align-items: center; gap: 6px;
}
.sidebar-top h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }

.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; padding: 7px 10px 7px 28px; font-size: 13px;
  background: #e5e5ea; color: var(--text);
  border: none; border-radius: 6px; outline: none;
  font-family: var(--font); transition: background 0.15s;
}
.search-wrap input:focus { background: #fff; box-shadow: 0 0 0 3px rgba(0,122,255,0.15); }
.search-wrap input::placeholder { color: var(--text-tertiary); }
.search-wrap .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--text-tertiary); pointer-events: none; }

#sidebar-toggle {
  position: absolute; right: 0; top: 50%; transform: translateY(-50%);
  width: 20px; height: 40px;
  border: 1px solid var(--border); border-right: none;
  background: #fff; cursor: pointer; z-index: 5;
  font-size: 10px; color: var(--text-tertiary);
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px 0 0 6px; transition: all 0.12s;
}
#sidebar-toggle:hover { background: #f0f0f5; color: var(--text); }

#folder-list { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 8px 8px; }
#folder-list::-webkit-scrollbar { width: 4px; }
#folder-list::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 2px; }
#folder-list::-webkit-scrollbar-track { background: transparent; }

/* 文件夹树（保留所有原有样式） */
.folder-section { margin-bottom: 4px; border-radius: var(--radius); overflow: hidden; background: transparent; transition: background 0.15s; }
.folder-header { display: flex; align-items: center; padding: 6px 8px; cursor: pointer; border-radius: var(--radius); gap: 4px; transition: background 0.1s; position: relative; }
.folder-header:hover { background: rgba(0,0,0,0.04); }
.folder-header .folder-chevron { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text-secondary); transition: transform 0.15s; flex-shrink: 0; }
.folder-header .folder-chevron.expanded { transform: rotate(90deg); }
.folder-header .folder-icon { font-size: 15px; flex-shrink: 0; }
.folder-header .folder-name { flex: 1; font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.folder-header .folder-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
.folder-header:hover .folder-actions { opacity: 1; }
.folder-header .folder-btn { width: 22px; height: 22px; border-radius: 4px; border: none; background: transparent; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all 0.1s; }
.folder-header .folder-btn:hover { background: rgba(0,0,0,0.08); color: var(--text); }
.folder-header .folder-btn.danger:hover { color: #ff3b30; }

.folder-children { display: none; }
.folder-children.open { display: block; }

.tree-item { display: flex; align-items: center; padding: 3px 8px 3px 24px; cursor: pointer; font-size: 12.5px; white-space: nowrap; border-radius: 4px; margin: 0 4px; transition: background 0.1s; gap: 4px; color: var(--text-secondary); position: relative; }
.tree-item:hover { background: rgba(0,0,0,0.05); color: var(--text); }
.tree-item.active { background: rgba(0,122,255,0.1); color: var(--accent); font-weight: 500; }
.tree-item .item-icon { width: 15px; text-align: center; flex-shrink: 0; font-size: 13px; }
.tree-item .item-name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
.tree-item.depth-1 { padding-left: 38px; }
.tree-item.depth-2 { padding-left: 52px; }
.tree-item.depth-3 { padding-left: 66px; }
.tree-item.dragging { opacity: 0.35; }
.tree-item.drop-target { background: rgba(0,122,255,0.12); outline: 2px solid var(--accent); outline-offset: -1px; border-radius: 4px; }
.tree-item.drop-before::before { content: ''; position: absolute; top: -1px; left: 8px; right: 4px; height: 2px; background: var(--accent); border-radius: 1px; z-index: 5; }
.tree-item.drop-after::after { content: ''; position: absolute; bottom: -1px; left: 8px; right: 4px; height: 2px; background: var(--accent); border-radius: 1px; z-index: 5; }

.sidebar-bottom { padding: 8px 10px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.sidebar-bottom button { padding: 8px 6px; font-size: 12px; border: 1px solid var(--border); background: #fff; border-radius: 8px; cursor: pointer; font-family: var(--font); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.15s; white-space: nowrap; }
.sidebar-bottom button:hover { background: #f0f0f5; }
.sidebar-bottom button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.sidebar-bottom button.primary:hover { background: var(--accent-hover); }

#sidebar.drag-over { background: rgba(0,122,255,0.06); outline: 3px dashed var(--accent); outline-offset: -3px; }
.drop-hint { display: none; position: absolute; inset: 0; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: var(--accent); pointer-events: none; z-index: 10; background: rgba(255,255,255,0.7); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
#sidebar.drag-over .drop-hint { display: flex; }
#sidebar { position: relative; }

/* ========== 主内容区 ========== */
#main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; }

#tab-bar { display: flex; background: #f8f8fc; border-bottom: 1px solid var(--border); overflow-x: auto; min-height: 38px; }
#tab-bar::-webkit-scrollbar { height: 0; }
.tab { display: flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 12px; cursor: pointer; white-space: nowrap; min-width: 0; color: var(--text-secondary); border-right: 1px solid var(--border); transition: all 0.1s; position: relative; }
.tab:hover { background: rgba(0,0,0,0.03); }
.tab.active { background: #fff; color: var(--text); font-weight: 500; margin-bottom: -1px; border-bottom: 2px solid var(--accent); }
.tab .tab-icon { font-size: 14px; flex-shrink: 0; }
.tab .tab-name { overflow: hidden; text-overflow: ellipsis; }
.tab .tab-close { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 3px; font-size: 15px; flex-shrink: 0; opacity: 0; transition: opacity 0.1s; line-height: 1; }
.tab:hover .tab-close { opacity: 0.5; }
.tab .tab-close:hover { opacity: 1; background: rgba(0,0,0,0.1); }

#content-area { flex: 1; overflow: auto; position: relative; }

/* 欢迎页 */
#welcome-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); gap: 10px; }
#welcome-page .welcome-icon { font-size: 52px; margin-bottom: 4px; }
#welcome-page h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
#welcome-page p { font-size: 14px; }
#welcome-page .shortcuts { margin-top: 24px; background: var(--bg); padding: 16px 24px; border-radius: var(--radius-lg); font-size: 13px; line-height: 2.2; box-shadow: var(--shadow); }
#welcome-page .shortcuts kbd { background: #fff; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; box-shadow: 0 1px 0 rgba(0,0,0,0.1); }

/* 文件面板 */
.file-panel { display: none; width: 100%; height: 100%; flex-direction: column; }
.file-panel.visible { display: flex; }

.text-viewer { padding: 24px 32px; font-family: var(--font-mono); font-size: 13px; line-height: 1.65; white-space: pre-wrap; word-break: break-all; overflow: auto; flex: 1; color: #333; }

.md-viewer { padding: 24px 36px; overflow: auto; flex: 1; line-height: 1.85; color: #333; max-width: 860px; }

.md-toolbar { display: flex; align-items: center; gap: 4px; padding: 6px 12px; background: #f8f8fc; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.md-toolbar .md-mode-btn { padding: 4px 10px; font-size: 12px; border-radius: 4px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-family: var(--font); color: var(--text); transition: all 0.1s; }
.md-toolbar .md-mode-btn:hover { background: #f0f0f5; }
.md-toolbar .md-mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.md-toolbar .md-save-btn { padding: 4px 12px; font-size: 12px; border-radius: 4px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-family: var(--font); font-weight: 500; margin-left: auto; transition: all 0.1s; }
.md-toolbar .md-save-btn:hover { background: var(--accent-hover); }
.md-toolbar .md-save-btn.saved { background: #34c759; }
.md-toolbar .md-modified { font-size: 11px; color: var(--text-tertiary); margin-left: 8px; }

.md-editor { flex: 1; width: 100%; padding: 24px 36px; font-family: var(--font-mono); font-size: 14px; line-height: 1.7; border: none; outline: none; resize: none; color: #333; background: #fff; tab-size: 2; }
.md-viewer h1 { font-size: 28px; font-weight: 700; margin: 24px 0 14px; padding-bottom: 8px; border-bottom: 2px solid #e5e5ea; letter-spacing: -0.4px; }
.md-viewer h2 { font-size: 22px; font-weight: 600; margin: 18px 0 10px; }
.md-viewer h3 { font-size: 17px; font-weight: 600; margin: 14px 0 8px; }
.md-viewer p { margin: 8px 0; }
.md-viewer code { background: #f2f2f7; padding: 2px 6px; border-radius: 4px; font-family: var(--font-mono); font-size: 12px; color: #ff3b30; }
.md-viewer pre { background: #f2f2f7; padding: 16px 20px; border-radius: var(--radius); overflow-x: auto; margin: 12px 0; }
.md-viewer pre code { background: none; padding: 0; color: #333; }
.md-viewer ul, .md-viewer ol { padding-left: 24px; margin: 8px 0; }
.md-viewer blockquote { border-left: 3px solid var(--accent); padding: 6px 16px; margin: 12px 0; color: var(--text-secondary); background: #f8f8fc; border-radius: 0 6px 6px 0; }
.md-viewer a { color: var(--accent); }
.md-viewer table { border-collapse: collapse; margin: 12px 0; width: 100%; }
.md-viewer th, .md-viewer td { border: 1px solid #e5e5ea; padding: 8px 14px; text-align: left; }
.md-viewer th { background: #f8f8fc; font-weight: 600; }

.html-viewer { flex: 1; border: none; width: 100%; height: 100%; background: #fff; }
.image-viewer-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #f2f2f7; overflow: auto; }
.image-viewer-wrap img { max-width: 95%; max-height: 95%; object-fit: contain; box-shadow: var(--shadow-lg); border-radius: 4px; }
.pdf-viewer { flex: 1; border: none; width: 100%; height: 100%; }
.office-info { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; }
.office-info .office-icon { font-size: 72px; }
.office-info .office-name { font-size: 17px; font-weight: 600; color: var(--text); }
.office-info .office-meta { font-size: 13px; color: var(--text-secondary); }
.office-info .office-hint { font-size: 13px; color: var(--text-tertiary); margin-top: 8px; background: var(--bg); padding: 8px 16px; border-radius: 6px; }

/* ========== 管理面板（模型/CLI/MCP）========== */
.mgmt-panel { padding: 28px 36px; overflow-y: auto; flex: 1; }
.mgmt-panel h2 { font-size: 22px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
.mgmt-panel h3 { font-size: 16px; font-weight: 600; margin: 24px 0 12px; color: var(--text); }

.mgmt-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 10px;
  transition: all 0.12s;
}
.mgmt-card:hover { box-shadow: var(--shadow); }

.mgmt-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.mgmt-card-header .mgmt-icon { font-size: 24px; }
.mgmt-card-header h4 { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
.mgmt-card-header .mgmt-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: #e8f5e9; color: #2e7d32; font-weight: 500;
}
.mgmt-card-header .mgmt-badge.off { background: #f5f5f5; color: var(--text-tertiary); }

.mgmt-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.mgmt-card code { background: #f2f2f7; padding: 1px 5px; border-radius: 3px; font-family: var(--font-mono); font-size: 11px; }
.mgmt-card pre { background: #f2f2f7; padding: 10px 14px; border-radius: 6px; font-family: var(--font-mono); font-size: 11px; overflow-x: auto; margin: 8px 0; line-height: 1.5; }

/* 模型配置表单 */
.model-form { max-width: 520px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
.form-group input, .form-group select {
  width: 100%; padding: 8px 12px; font-size: 14px;
  border: 1px solid var(--border); border-radius: 6px; outline: none;
  font-family: var(--font); color: var(--text);
  transition: border-color 0.15s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,122,255,0.12); }
.form-group select { background: #fff; cursor: pointer; appearance: none; -webkit-appearance: none; }

/* API Key 输入 */
.api-key-wrap { position: relative; }
.api-key-wrap input { padding-right: 50px; }
.api-key-wrap .toggle-key {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text-tertiary); padding: 4px;
}
.api-key-wrap .toggle-key:hover { color: var(--text); }

/* ========== 添加模型按钮 ========== */
.add-model-btn {
  padding: 8px 16px; font-size: 13px; font-weight: 500;
  background: var(--accent); color: #fff; border: none;
  border-radius: 6px; cursor: pointer; font-family: var(--font);
  transition: background 0.12s; margin-top: 12px;
}
.add-model-btn:hover { background: var(--accent-hover); }
.remove-model-btn {
  padding: 4px 10px; font-size: 11px; color: #ff3b30;
  border: 1px solid #ffcdd2; background: #fff;
  border-radius: 4px; cursor: pointer; font-family: var(--font);
  transition: all 0.1s;
}
.remove-model-btn:hover { background: #fff5f5; }

/* ========== 聊天栏 ========== */
#chat-column {
  width: var(--chat-width);
  min-width: 280px;
  background: var(--bg-chat);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: relative;
}
#chat-column.collapsed { width: 0; min-width: 0; overflow: hidden; border: none; }

.chat-resize-handle {
  position: absolute; left: -3px; top: 0; bottom: 0;
  width: 6px; cursor: col-resize; z-index: 5;
}
.chat-resize-handle:hover, .chat-resize-handle:active { background: rgba(0,122,255,0.2); }

.chat-header {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  font-size: 14px; font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.chat-header select {
  font-size: 12px; padding: 3px 8px;
  border: 1px solid var(--border); border-radius: 4px;
  background: #fff; font-family: var(--font); color: var(--text);
  cursor: pointer; max-width: 140px;
}
#chat-toggle {
  margin-left: auto; width: 28px; height: 28px;
  border-radius: 6px; border: 1px solid var(--border);
  background: #fff; cursor: pointer; font-size: 13px;
  color: var(--text-tertiary); display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
#chat-toggle:hover { background: #f0f0f5; color: var(--text); }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 2px; }

.chat-msg { max-width: 90%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.55; word-wrap: break-word; }
.chat-msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.chat-msg.assistant { align-self: flex-start; background: #fff; color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.chat-msg.error { align-self: flex-start; background: #fff3f3; color: #c62828; border: 1px solid #ffcdd2; }
.chat-msg pre { background: #f2f2f7; padding: 8px 12px; border-radius: 6px; font-family: var(--font-mono); font-size: 11px; overflow-x: auto; margin: 6px 0; }
.chat-msg code { font-family: var(--font-mono); font-size: 11px; background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px; }

.chat-empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text-tertiary); font-size: 13px; gap: 8px;
}
.chat-empty .ce-icon { font-size: 40px; }

.chat-input-area {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
.chat-input-area textarea {
  flex: 1; padding: 8px 12px; font-size: 13px; line-height: 1.4;
  border: 1px solid var(--border); border-radius: 8px; outline: none;
  font-family: var(--font); resize: none; color: var(--text);
  min-height: 38px; max-height: 120px;
  transition: border-color 0.15s;
}
.chat-input-area textarea:focus { border-color: var(--accent); }
.chat-input-area button {
  padding: 8px 16px; font-size: 13px; font-weight: 500;
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; cursor: pointer; font-family: var(--font);
  align-self: flex-end; transition: background 0.12s;
}
.chat-input-area button:hover { background: var(--accent-hover); }
.chat-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

/* ========== 状态栏 ========== */
#status-bar { display: flex; align-items: center; justify-content: space-between; padding: 4px 16px; font-size: 11px; background: #f8f8fc; color: var(--text-tertiary); border-top: 1px solid var(--border); min-height: 26px; }

/* ========== 右键菜单 ========== */
#context-menu { display: none; position: fixed; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06); z-index: 2000; padding: 4px 0; min-width: 190px; }
#context-menu.open { display: block; }
.context-menu-item { padding: 7px 16px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.08s; color: var(--text); }
.context-menu-item:hover { background: rgba(0,122,255,0.08); color: var(--accent); }
.context-menu-item.danger:hover { background: rgba(255,59,48,0.08); color: #ff3b30; }
.context-menu-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* ========== 输入弹窗 ========== */
#modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); z-index: 3000; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
#modal-box { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); padding: 24px; width: 400px; max-width: 92vw; }
#modal-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
#modal-box .field { margin-bottom: 12px; }
#modal-box .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
#modal-box input { width: 100%; padding: 8px 12px; font-size: 14px; border: 1px solid var(--border); border-radius: 6px; outline: none; font-family: var(--font); color: var(--text); }
#modal-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,122,255,0.12); }
#modal-box select { width: 100%; padding: 8px 12px; font-size: 14px; border: 1px solid var(--border); border-radius: 6px; outline: none; font-family: var(--font); color: var(--text); background: #fff; cursor: pointer; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236e6e73' fill='none' stroke-width='1.5'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; }
#modal-box .location-row { display: flex; align-items: center; gap: 8px; }
#modal-box .location-row span { flex: 1; font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 7px 0; }
#modal-box .location-row .loc-btn { flex-shrink: 0; padding: 5px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 5px; background: #fff; cursor: pointer; font-family: var(--font); color: var(--accent); white-space: nowrap; }
#modal-box .location-row .loc-btn:hover { background: #f0f0f5; }
#modal-box .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
#modal-box .modal-btns button { padding: 6px 16px; font-size: 13px; border-radius: 6px; border: none; cursor: pointer; font-family: var(--font); font-weight: 500; }
#modal-box .btn-cancel { background: #f2f2f7; color: var(--text); }
#modal-box .btn-cancel:hover { background: #e5e5ea; }
#modal-box .btn-confirm { background: var(--accent); color: #fff; }
#modal-box .btn-confirm:hover { background: var(--accent-hover); }

/* 快速搜索 */
#quick-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); z-index: 1000; align-items: flex-start; justify-content: center; padding-top: 18vh; }
#quick-overlay.open { display: flex; }
#quick-panel { width: 520px; max-width: 92vw; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: var(--radius-lg); box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.08); overflow: hidden; }
#quick-input { width: 100%; padding: 14px 20px; font-size: 17px; background: transparent; color: var(--text); border: none; outline: none; font-family: var(--font); border-bottom: 1px solid var(--border); }
#quick-input::placeholder { color: var(--text-tertiary); }
#quick-results { max-height: 340px; overflow-y: auto; }
#quick-results::-webkit-scrollbar { width: 4px; }
#quick-results::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 2px; }
.quick-result { display: flex; align-items: center; gap: 8px; padding: 7px 20px; cursor: pointer; font-size: 13px; transition: background 0.08s; }
.quick-result:hover, .quick-result.selected { background: rgba(0,122,255,0.08); }
.quick-result .qr-icon { font-size: 16px; flex-shrink: 0; }
.quick-result .qr-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.quick-result .qr-path { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.empty-state { padding: 24px 16px; text-align: center; color: var(--text-tertiary); font-size: 13px; }

/* 响应式 */
@media (max-width: 600px) {
  #sidebar { width: 100% !important; min-width: 0; }
  #main-panel { display: none; }
}
</style>
</head>
<body>

<div id="app">
  <div id="main-layout">
    <!-- ===== 列 1：模块导航 ===== -->
    <nav id="module-nav">
      <button class="module-btn active" data-module="file" title="文件管理">
        <span class="mb-icon">📁</span><span class="mb-label">文件</span>
      </button>
      <button class="module-btn" data-module="model" title="模型管理">
        <span class="mb-icon">🤖</span><span class="mb-label">模型</span>
      </button>
      <button class="module-btn" data-module="cli" title="CLI管理">
        <span class="mb-icon">🔧</span><span class="mb-label">CLI</span>
      </button>
      <button class="module-btn" data-module="mcp" title="MCP管理">
        <span class="mb-icon">🔌</span><span class="mb-label">MCP</span>
      </button>
      <button id="nav-toggle" title="折叠导航栏">◀</button>
    </nav>

    <!-- ===== 列 2：中间内容区 ===== -->
    <div id="center-panel">

      <!-- 文件模块 -->
      <div id="file-module" class="module-content active">
        <aside id="sidebar">
          <div class="drop-hint">📂 松手添加文件夹</div>
          <div class="sidebar-top">
            <h1>PartnerFM<span class="dot"></span></h1>
            <div class="search-wrap">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" placeholder="搜索文件...">
            </div>
          </div>
          <div id="folder-list"></div>
          <div class="sidebar-bottom">
            <button id="add-folder-btn" class="primary">📂 添加文件夹</button>
            <button id="refresh-btn">🔄 刷新</button>
          </div>
        </aside>
        <div id="main-panel">
          <div id="tab-bar"></div>
          <div id="content-area">
            <div id="welcome-page">
              <div class="welcome-icon">🗂️</div>
              <h2>PartnerFM</h2>
              <p>点击「添加文件夹」选择单个文件夹，或从访达拖入多个文件夹</p>
              <div class="shortcuts">
                <div><kbd>⌘P</kbd> 快速搜索文件</div>
                <div><kbd>⌘W</kbd> 关闭当前标签</div>
                <div><kbd>⌘⇧T</kbd> 恢复关闭的标签</div>
              </div>
            </div>
          </div>
          <div id="status-bar">
            <span id="status-left">就绪</span>
            <span id="status-right"></span>
          </div>
        </div>
      </div>

      <!-- 模型模块 -->
      <div id="model-module" class="module-content">
        <div class="mgmt-panel">
          <h2>🤖 模型管理</h2>
          <p style="color:var(--text-secondary);font-size:13px;margin-bottom:20px">配置大模型 API Key，在聊天窗口中直接使用。</p>
          <div id="model-list"></div>
          <button class="add-model-btn" onclick="showAddModelForm()">+ 添加模型</button>
        </div>
      </div>

      <!-- CLI 模块 -->
      <div id="cli-module" class="module-content">
        <div class="mgmt-panel">
          <h2>🔧 CLI 管理</h2>
          <p style="color:var(--text-secondary);font-size:13px;margin-bottom:4px">已连接的 CLI 工具。在聊天窗口用自然语言描述任务，我来帮你调用。</p>
          <div id="cli-list"></div>
        </div>
      </div>

      <!-- MCP 模块 -->
      <div id="mcp-module" class="module-content">
        <div class="mgmt-panel">
          <h2>🔌 MCP 管理</h2>
          <p style="color:var(--text-secondary);font-size:13px;margin-bottom:4px">已配置的 MCP 服务器。为大模型扩展文件访问、网页获取等能力。</p>
          <div id="mcp-list"></div>
        </div>
      </div>

    </div>

    <!-- ===== 列 3：聊天窗口 ===== -->
    <div id="chat-column">
      <div class="chat-resize-handle" id="chat-resizer"></div>
      <div class="chat-header">
        💬 对话
        <select id="chat-model-select"><option value="">未选择模型</option></select>
        <button id="chat-toggle" title="折叠">▶</button>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="chat-empty">
          <div class="ce-icon">💬</div>
          选择模型后开始对话
        </div>
      </div>
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="输入消息..." rows="1" onkeydown="handleChatKey(event)"></textarea>
        <button id="chat-send" onclick="sendChat()">发送</button>
      </div>
    </div>
  </div>
</div>

<!-- 右键菜单 -->
<div id="context-menu"></div>

<!-- 输入弹窗 -->
<div id="modal-overlay">
  <div id="modal-box">
    <h3 id="modal-title"></h3>
    <div class="field"><label>文件名</label><input type="text" id="modal-input" autocomplete="off"></div>
    <div class="field" id="modal-type-field" style="display:none"><label>文件类型</label><select id="modal-type-select"></select></div>
    <div class="field" id="modal-location-field" style="display:none">
      <label>保存位置</label>
      <div class="location-row"><span id="modal-location-text">未选择</span><button class="loc-btn" id="modal-location-btn">选择文件夹</button></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">取消</button>
      <button class="btn-confirm" id="modal-confirm">确定</button>
    </div>
  </div>
</div>

<!-- 快速搜索 -->
<div id="quick-overlay">
  <div id="quick-panel">
    <input type="text" id="quick-input" placeholder="搜索文件名...">
    <div id="quick-results"></div>
  </div>
</div>

<script>
// ========== 数据库 ==========
const DB_NAME = 'file-manager-db', DB_VERSION = 1;
function openDB() { return new Promise((r, j) => { const q = indexedDB.open(DB_NAME, DB_VERSION); q.onupgradeneeded = e => { const d = e.target.result; if (!d.objectStoreNames.contains('folders')) d.createObjectStore('folders', { keyPath: 'id' }); }; q.onsuccess = e => r(e.target.result); q.onerror = e => j(e.target.error); }); }
async function saveFolderHandle(id, name, handle) { const d = await openDB(); return new Promise((r, j) => { const t = d.transaction('folders', 'readwrite'); const s = t.objectStore('folders'); s.put({ id, name, handle, addedAt: Date.now() }); t.oncomplete = r; t.onerror = j; }); }
async function getSavedFolders() { const d = await openDB(); return new Promise((r, j) => { const t = d.transaction('folders', 'readonly'); const s = t.objectStore('folders'); const q = s.getAll(); q.onsuccess = () => r(q.result); q.onerror = j; }); }
async function removeSavedFolder(id) { const d = await openDB(); return new Promise((r, j) => { const t = d.transaction('folders', 'readwrite'); const s = t.objectStore('folders'); s.delete(id); t.oncomplete = r; t.onerror = j; }); }

// ========== 全局状态 ==========
const state = { folders: [], openTabs: [], activeTabId: null, closedTabs: [], allFiles: [], expandedNodes: new Set(), customOrder: new Map(), dragIndicator: null };
let activeModule = 'file';

// 聊天状态
const chatState = { models: [], currentModelIdx: -1, messages: [], chats: {} };

const $ = s => document.querySelector(s);
const dom = {
  searchInput: $('#search-input'), folderList: $('#folder-list'), addFolderBtn: $('#add-folder-btn'), refreshBtn: $('#refresh-btn'),
  tabBar: $('#tab-bar'), contentArea: $('#content-area'), welcomePage: $('#welcome-page'),
  statusLeft: $('#status-left'), statusRight: $('#status-right'),
  quickOverlay: $('#quick-overlay'), quickInput: $('#quick-input'), quickResults: $('#quick-results'),
  contextMenu: $('#context-menu'),
  modalOverlay: $('#modal-overlay'), modalTitle: $('#modal-title'), modalInput: $('#modal-input'),
  modalCancel: $('#modal-cancel'), modalConfirm: $('#modal-confirm'),
  modalTypeField: $('#modal-type-field'), modalTypeSelect: $('#modal-type-select'),
  modalLocationField: $('#modal-location-field'), modalLocationText: $('#modal-location-text'), modalLocationBtn: $('#modal-location-btn'),
  sidebar: $('#sidebar'),
};
const d = (id) => document.getElementById(id);

// ========== 工具函数 ==========
function getFileIcon(name) {
  const ext = name.split('.').pop()?.toLowerCase();
  const m = { md:'📝',html:'🌐',htm:'🌐',pdf:'📕',png:'🖼️',jpg:'🖼️',jpeg:'🖼️',gif:'🖼️',webp:'🖼️',svg:'🖼️',txt:'📄',js:'📜',ts:'📘',jsx:'📘',tsx:'📘',css:'🎨',json:'📋',yaml:'📋',yml:'📋',py:'🐍',rs:'🦀',go:'🔵',pptx:'📊',ppt:'📊',docx:'📝',doc:'📝',xlsx:'📈',xls:'📈',zip:'📦',rar:'📦',tar:'📦',gz:'📦','7z':'📦',mp3:'🎵',mp4:'🎬',mov:'🎬' };
  return m[ext] || '📄';
}
function formatSize(b) { if (!b || b === 0) return ''; if (b < 1024) return b + ' B'; if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'; return (b / 1048576).toFixed(2) + ' MB'; }
function formatDate(ts) { if (!ts) return ''; const d = new Date(ts); return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
function simpleMD(text) {
  let h = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) => `<pre><code>${c.trim()}</code></pre>`);
  h = h.replace(/^#### (.+)$/gm,'<h4>$1</h4>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h = h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
  h = h.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  h = h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%">');
  h = h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^---$/gm,'<hr>');
  h = h.replace(/^- (.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');
  h = h.replace(/\n\n/g,'</p><p>'); h = '<p>' + h + '</p>'; h = h.replace(/<p>\s*<\/p>/g,'');
  h = h.replace(/<p>(<h[1-6])/g,'$1').replace(/(<\/h[1-6]>)<\/p>/g,'$1').replace(/<p>(<ul)/g,'$1').replace(/(<\/ul>)<\/p>/g,'$1');
  h = h.replace(/<p>(<pre)/g,'$1').replace(/(<\/pre>)<\/p>/g,'$1').replace(/<p>(<blockquote)/g,'$1').replace(/(<\/blockquote>)<\/p>/g,'$1');
  return h;
}

// ========== 模块切换 ==========
function switchModule(name) {
  activeModule = name;
  document.querySelectorAll('.module-btn').forEach(b => b.classList.toggle('active', b.dataset.module === name));
  document.querySelectorAll('.module-content').forEach(c => c.classList.toggle('active', c.id === name + '-module'));
  if (name === 'cli') loadCliList();
  if (name === 'mcp') loadMcpList();
  saveState();
}

document.querySelectorAll('.module-btn').forEach(b => b.addEventListener('click', () => switchModule(b.dataset.module)));

// ========== 导航折叠 ==========
let navCollapsed = false;
d('nav-toggle').addEventListener('click', () => {
  navCollapsed = !navCollapsed;
  d('module-nav').classList.toggle('collapsed', navCollapsed);
  d('nav-toggle').textContent = navCollapsed ? '▶' : '◀';
});

// ========== 聊天折叠 ==========
let chatCollapsed = false;
d('chat-toggle').addEventListener('click', () => {
  chatCollapsed = !chatCollapsed;
  d('chat-column').classList.toggle('collapsed', chatCollapsed);
  d('chat-toggle').textContent = chatCollapsed ? '◀' : '▶';
});
</script>

</body>
</html>
